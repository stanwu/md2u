name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true
        type: string
      linux:
        description: 'Build Linux (.deb, .rpm)'
        required: true
        type: boolean
        default: true
      windows:
        description: 'Build Windows (.exe, .msi)'
        required: true
        type: boolean
        default: true
      prerelease:
        description: 'Mark as pre-release'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            targets: deb,rpm
            enabled_input: linux
          - platform: windows-latest
            targets: nsis,msi
            enabled_input: windows

    runs-on: ${{ matrix.platform }}
    if: ${{ (matrix.enabled_input == 'linux' && inputs.linux) || (matrix.enabled_input == 'windows' && inputs.windows) }}

    outputs:
      artifacts: ${{ steps.tauri.outputs.artifactPaths }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.version }}
          releaseName: 'marked2u ${{ inputs.version }}'
          releaseBody: |
            ## marked2u ${{ inputs.version }}

            輕量級桌面 Markdown 預覽器，基於 Tauri 打造。

            ### 下載

            | 平台 | 檔案 | 說明 |
            |------|------|------|
            | Linux | `.deb` | Debian / Ubuntu |
            | Linux | `.rpm` | Fedora / RHEL / openSUSE |
            | Windows | `.exe` | NSIS 安裝程式 |
            | Windows | `.msi` | MSI 安裝程式 |

            ### 安裝

            **Linux (Debian/Ubuntu)**
            ```bash
            sudo dpkg -i marked2u_*.deb
            ```

            **Linux (Fedora/RHEL)**
            ```bash
            sudo rpm -i marked2u-*.rpm
            ```

            **Windows**
            執行 `.exe` 或 `.msi` 安裝程式。

            ---
            > 本專案 100% 由 [Claude Code](https://claude.ai/code) 開發。
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          includeUpdaterJson: false
          args: --bundles ${{ matrix.targets }}

      - name: Scan with ClamAV (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get install -y clamav clamav-daemon
          sudo systemctl stop clamav-freshclam || true
          sudo freshclam
          ARTIFACTS="${{ steps.tauri.outputs.artifactPaths }}"
          echo "Scanning: $ARTIFACTS"
          echo "$ARTIFACTS" | tr ',' '\n' | while read f; do
            [ -f "$f" ] || continue
            echo "→ Scanning $f"
            clamscan --no-summary "$f" || (echo "INFECTED: $f" && exit 1)
          done
          echo "ClamAV scan passed."

      - name: Scan with Windows Defender (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $artifacts = "${{ steps.tauri.outputs.artifactPaths }}" -split ","
          foreach ($f in $artifacts) {
            $f = $f.Trim()
            if (-not (Test-Path $f)) { continue }
            Write-Host "→ Scanning $f"
            $result = Start-Process -FilePath "C:\Program Files\Windows Defender\MpCmdRun.exe" `
              -ArgumentList "-Scan -ScanType 3 -File `"$f`"" `
              -Wait -PassThru -NoNewWindow
            if ($result.ExitCode -ne 0) {
              Write-Error "INFECTED or scan error: $f (exit code $($result.ExitCode))"
              exit 1
            }
          }
          Write-Host "Windows Defender scan passed."

      - name: Upload artifacts for publish
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: ${{ steps.tauri.outputs.artifactPaths }}
          retention-days: 1

  publish:
    needs: [build, virustotal]
    runs-on: ubuntu-latest
    if: ${{ success() }}

    steps:
      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ inputs.version }} --draft=false --repo ${{ github.repository }}
