name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.2.0)'
        required: true
        type: string
      linux:
        description: 'Build Linux (.deb, .rpm)'
        required: true
        type: boolean
        default: true
      windows:
        description: 'Build Windows (.exe, .msi)'
        required: true
        type: boolean
        default: true
      prerelease:
        description: 'Mark as pre-release'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    if: ${{ inputs.linux }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.version }}
          releaseName: 'marked2u ${{ inputs.version }}'
          releaseBody: |
            ## marked2u ${{ inputs.version }}

            輕量級桌面 Markdown 預覽器，基於 Tauri 打造。

            ### 下載

            | 平台 | 檔案 | 說明 |
            |------|------|------|
            | Linux | `.deb` | Debian / Ubuntu |
            | Linux | `.rpm` | Fedora / RHEL / openSUSE |
            | Windows | `.exe` | NSIS 安裝程式 |
            | Windows | `.msi` | MSI 安裝程式 |

            ### 安裝

            **Linux (Debian/Ubuntu)**
            ```bash
            sudo dpkg -i marked2u_*.deb
            ```

            **Linux (Fedora/RHEL)**
            ```bash
            sudo rpm -i marked2u-*.rpm
            ```

            **Windows**
            執行 `.exe` 或 `.msi` 安裝程式。

            ---
            > 本專案 100% 由 [Claude Code](https://claude.ai/code) 開發。
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          includeUpdaterJson: false
          args: --bundles deb,rpm

      - name: Scan with ClamAV
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          sudo apt-get install -y clamav
          sudo systemctl stop clamav-freshclam || true
          sudo freshclam
          echo "$ARTIFACT_PATHS" | python3 -c "import sys,json; [print(p) for p in json.load(sys.stdin)]" | while read -r f; do
            [ -f "$f" ] || continue
            echo "Scanning $f"
            clamscan --no-summary "$f" || (echo "INFECTED: $f" && exit 1)
          done
          echo "ClamAV scan passed."

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: artifacts-linux
          path: ${{ steps.tauri.outputs.artifactPaths }}
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    if: ${{ inputs.windows }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.version }}
          releaseName: 'marked2u ${{ inputs.version }}'
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          includeUpdaterJson: false
          args: --bundles nsis,msi

      - name: Scan with Windows Defender
        shell: pwsh
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          $artifacts = $env:ARTIFACT_PATHS | ConvertFrom-Json
          foreach ($f in $artifacts) {
            if (-not (Test-Path $f)) { continue }
            Write-Host "Scanning $f"
            $result = Start-Process -FilePath "C:\Program Files\Windows Defender\MpCmdRun.exe" `
              -ArgumentList "-Scan -ScanType 3 -File `"$f`"" `
              -Wait -PassThru -NoNewWindow
            if ($result.ExitCode -ne 0) {
              Write-Error "INFECTED or scan error: $f (exit code $($result.ExitCode))"
              exit 1
            }
          }
          Write-Host "Windows Defender scan passed."

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: artifacts-windows
          path: ${{ steps.tauri.outputs.artifactPaths }}
          retention-days: 1

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}

    steps:
      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ inputs.version }} --draft=false --repo ${{ github.repository }}
