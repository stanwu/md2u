name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            targets: deb,rpm
          - platform: windows-latest
            targets: nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'marked2u ${{ github.ref_name }}'
          releaseBody: |
            ## marked2u ${{ github.ref_name }}

            輕量級桌面 Markdown 預覽器，基於 Tauri 打造。

            ### 下載

            | 平台 | 檔案 | 說明 |
            |------|------|------|
            | Linux | `.deb` | Debian / Ubuntu |
            | Linux | `.rpm` | Fedora / RHEL / openSUSE |
            | Windows | `.exe` | NSIS 安裝程式 |
            | Windows | `.msi` | MSI 安裝程式 |

            ### 安裝

            **Linux (Debian/Ubuntu)**
            ```bash
            sudo dpkg -i marked2u_*.deb
            ```

            **Linux (Fedora/RHEL)**
            ```bash
            sudo rpm -i marked2u-*.rpm
            ```

            **Windows**
            執行 `.exe` 或 `.msi` 安裝程式。

            ---
            > 本專案 100% 由 [Claude Code](https://claude.ai/code) 開發。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --bundles ${{ matrix.targets }}
