<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>marked2u — Cross-Platform Markdown Previewer</title>
  <meta name="description" content="Lightweight, open-source, cross-platform Markdown previewer with Obsidian-style rendering." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14; --bg2: #13131e; --bg3: #1a1a2e;
      --border: #2a2a45; --text: #e8e8f0; --muted: #8888aa;
      --accent: #7c6cf7; --accent2: #a78bfa;
      --red: #f87171;
      --nav-bg: rgba(13,13,20,0.85);
      --shadow: rgba(0,0,0,0.6);
      --hero-glow: rgba(124,108,247,0.15);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8f8fc; --bg2: #f0f0f8; --bg3: #e8e8f4;
        --border: #d0d0e8; --text: #1a1a2e; --muted: #6666aa;
        --accent: #6c5cf0; --accent2: #7c6cf7;
        --nav-bg: rgba(248,248,252,0.9);
        --shadow: rgba(0,0,0,0.15);
        --hero-glow: rgba(124,108,247,0.08);
      }
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif; font-size: 16px; line-height: 1.7; overflow-x: hidden; }

    /* Nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 48px; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); gap: 16px; }
    .nav-logo { font-size: 1.2rem; font-weight: 700; color: var(--accent2); letter-spacing: -0.02em; flex-shrink: 0; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .lang-switcher { display: flex; gap: 4px; }
    .lang-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
    .lang-btn:hover { border-color: var(--accent); color: var(--text); }
    .lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .nav-cta { background: var(--accent); color: #fff; border: none; padding: 8px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.2s, transform 0.1s; white-space: nowrap; }
    .nav-cta:hover { background: var(--accent2); transform: translateY(-1px); }

    /* Hero */
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 24px 80px; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; width: 800px; height: 800px; background: radial-gradient(circle, var(--hero-glow) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    .hero-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(124,108,247,0.15); border: 1px solid rgba(124,108,247,0.4); color: var(--accent2); font-size: 0.8rem; font-weight: 600; padding: 5px 14px; border-radius: 999px; margin-bottom: 28px; letter-spacing: 0.05em; }
    .hero h1 { font-size: clamp(2.8rem, 7vw, 5.5rem); font-weight: 800; letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 12px; background: linear-gradient(135deg, var(--text) 30%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-tagline { font-size: clamp(1.1rem, 2.5vw, 1.4rem); color: var(--muted); max-width: 560px; margin: 0 auto 16px; }
    .hero-sub { font-size: 0.95rem; color: var(--accent2); opacity: 0.8; margin-bottom: 48px; }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 72px; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 10px; font-size: 1rem; font-weight: 700; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; box-shadow: 0 4px 24px rgba(124,108,247,0.35); }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,108,247,0.5); }
    .btn-secondary { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text); text-decoration: none; padding: 14px 28px; border-radius: 10px; font-size: 1rem; font-weight: 600; transition: background 0.2s, transform 0.15s; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    .hero-screenshot { width: 100%; max-width: 900px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 32px 80px var(--shadow), 0 0 0 1px rgba(124,108,247,0.2); overflow: hidden; }
    .screenshot-bar { background: #1e1e2e; padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
    .screenshot-bar span { color: var(--muted); font-size: 12px; margin-left: 12px; }
    .hero-screenshot img { width: 100%; display: block; }

    /* Sections */
    .section-label { text-align: center; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); margin-bottom: 16px; }
    .section-title { text-align: center; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 16px; }
    .section-sub { text-align: center; color: var(--muted); max-width: 560px; margin: 0 auto 64px; font-size: 1.05rem; }

    /* Pain */
    .pain { padding: 100px 24px; background: var(--bg2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .pain-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
    .pain-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 28px; }
    .pain-icon { font-size: 2rem; margin-bottom: 16px; }
    .pain-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; }
    .pain-card p { color: var(--muted); font-size: 0.92rem; line-height: 1.65; }
    .tag-bad { display: inline-block; background: rgba(248,113,113,0.12); color: var(--red); font-size: 0.75rem; font-weight: 700; padding: 2px 10px; border-radius: 999px; margin-bottom: 12px; }
    .pain-solution { max-width: 760px; margin: 48px auto 0; background: linear-gradient(135deg, rgba(124,108,247,0.12), rgba(52,211,153,0.08)); border: 1px solid rgba(124,108,247,0.3); border-radius: 16px; padding: 32px 36px; text-align: center; }
    .pain-solution h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 12px; }
    .pain-solution p { color: var(--muted); font-size: 0.98rem; }
    .pain-solution strong { color: var(--accent2); }

    /* Features */
    .features { padding: 100px 24px 0; max-width: 1100px; margin: 0 auto; }
    .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 72px; }
    .feat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px; transition: border-color 0.2s, transform 0.2s; }
    .feat-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .feat-icon { font-size: 1.8rem; margin-bottom: 14px; }
    .feat-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .feat-card p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }

    /* Gallery */
    .gallery { padding: 0 24px 100px; max-width: 1100px; margin: 0 auto; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(460px, 1fr)); gap: 24px; }
    .gallery-item { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: var(--bg2); }
    .gallery-item img { width: 100%; display: block; }
    .gallery-caption { padding: 14px 18px; font-size: 0.85rem; color: var(--muted); border-top: 1px solid var(--border); }
    .gallery-caption strong { color: var(--text); }

    /* Download */
    .download { padding: 100px 24px; background: var(--bg2); border-top: 1px solid var(--border); text-align: center; }
    .download-platforms { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 48px auto 0; max-width: 720px; }
    .platform-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 28px 32px; text-align: left; min-width: 200px; transition: border-color 0.2s, transform 0.2s; }
    .platform-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .platform-icon { font-size: 2.2rem; margin-bottom: 12px; }
    .platform-name { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .platform-exts { font-size: 0.82rem; color: var(--muted); margin-bottom: 18px; }
    .platform-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; text-decoration: none; padding: 9px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; transition: background 0.2s; }
    .platform-btn:hover { background: var(--accent2); }
    .license-card { max-width: 860px; margin: 40px auto 0; background: linear-gradient(135deg, rgba(124,108,247,0.1), rgba(52,211,153,0.06)); border: 1px solid rgba(124,108,247,0.35); border-radius: 16px; padding: 28px 32px; }
    .license-card-inner { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .license-icon { font-size: 2.4rem; flex-shrink: 0; }
    .license-body { flex: 1; min-width: 200px; }
    .license-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 14px; color: var(--text); }
    .license-tiers { display: flex; gap: 12px; flex-wrap: wrap; }
    .license-tier { display: flex; flex-direction: column; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; min-width: 120px; }
    .tier-name { font-size: 0.78rem; font-weight: 700; color: var(--accent2); margin-bottom: 2px; }
    .tier-price { font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .tier-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .license-btn { flex-shrink: 0; display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 10px; font-size: 0.95rem; font-weight: 700; transition: background 0.2s, transform 0.15s; white-space: nowrap; }
    .license-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .download-note { margin-top: 36px; font-size: 0.85rem; color: var(--muted); }
    .download-note a { color: var(--accent2); text-decoration: none; }
    .download-note a:hover { text-decoration: underline; }

    /* Footer */
    footer { padding: 40px 48px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    footer .logo { font-weight: 700; color: var(--accent2); }
    footer p { font-size: 0.82rem; color: var(--muted); }
    footer a { color: var(--accent2); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .gallery-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; text-align: center; }
    }
  </style>
</head>

function detectLang() {
  const saved = localStorage.getItem('lang')
  if (saved && I18N[saved]) return saved
  const nav = navigator.language || 'zh-TW'
  if (nav.startsWith('zh-CN') || nav === 'zh') return 'zh-CN'
  if (nav.startsWith('zh')) return 'zh-TW'
  if (nav.startsWith('ja')) return 'ja'
  return 'en'
}

function applyLang(lang) {
  const t = I18N[lang]
  if (!t) return
  localStorage.setItem('lang', lang)
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n
    if (t[key] !== undefined) el.innerHTML = t[key]
  })
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang)
  })
  document.documentElement.lang = lang
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang))
})

applyLang(detectLang())
